version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: questiondb-mysql
    restart: always
    environment:
      MYSQL_DATABASE: questiondb
      MYSQL_ROOT_PASSWORD: root
      MYSQL_ALLOW_EMPTY_PASSWORD: 'yes'
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - questionapp-network
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost" ]
      timeout: 20s
      retries: 10

  mongodb:
    image: mongo:7.0
    container_name: questiondb-mongo
    restart: always
    environment:
      MONGO_INITDB_DATABASE: questiondb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - questionapp-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 40s

  # Opcional: Mongo Express para administración visual de MongoDB
  mongo-express:
    image: mongo-express:latest
    container_name: questiondb-mongo-express
    restart: always
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_URL: mongodb://mongodb:27017/
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: admin123
    depends_on:
      - mongodb
    networks:
      - questionapp-network

  # Opcional: phpMyAdmin para administración visual de MySQL
  phpmyadmin:
    image: phpmyadmin/phpmyadmin:latest
    container_name: questiondb-phpmyadmin
    restart: always
    ports:
      - "8082:80"
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      PMA_USER: root
      PMA_PASSWORD: root
    depends_on:
      - mysql
    networks:
      - questionapp-network

volumes:
  mysql_data:
    driver: local
  mongodb_data:
    driver: local

networks:
  questionapp-network:
    driver: bridge
