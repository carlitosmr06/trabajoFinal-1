<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">

<head th:replace="~{fragments/head :: head('Iniciar Sesión')}"></head>

<body class="d-flex flex-column min-vh-100">
    <div th:replace="~{fragments/header :: header}"></div>

    <main class="flex-shrink-0">
        <div class="container">
            <div class="row justify-content-center mt-5">
                <div class="col-md-6 col-lg-5">
                    <div class="card shadow">
                        <div class="card-body p-5">
                            <div class="text-center mb-4">
                                <i class="bi bi-person-circle display-1 text-primary"></i>
                                <h2 class="mt-3">Iniciar Sesión</h2>
                                <p class="text-muted">Accede a tu cuenta de QuestionApp</p>
                            </div>

                            <!-- Error Message -->
                            <div th:if="${param.error}" class="alert alert-danger" role="alert">
                                <i class="bi bi-exclamation-triangle-fill me-2"></i>
                                Usuario o contraseña incorrectos
                            </div>

                            <!-- Logout Message -->
                            <div th:if="${param.logout}" class="alert alert-success" role="alert">
                                <i class="bi bi-check-circle-fill me-2"></i>
                                Has cerrado sesión correctamente
                            </div>

                            <!-- Login Form -->
                            <form th:action="@{/login}" method="post">
                                <div class="mb-3">
                                    <label for="username" class="form-label">
                                        <i class="bi bi-person me-1"></i>
                                        Usuario
                                    </label>
                                    <input type="text" class="form-control form-control-lg" id="username"
                                        name="username" placeholder="Ingrese su usuario" required autofocus>
                                </div>

                                <div class="mb-3">
                                    <label for="password" class="form-label">
                                        <i class="bi bi-lock me-1"></i>
                                        Contraseña
                                    </label>
                                    <input type="password" class="form-control form-control-lg" id="password"
                                        name="password" placeholder="Ingrese su contraseña" required>
                                </div>

                                <div class="mb-3 form-check">
                                    <input type="checkbox" class="form-check-input" id="remember-me" name="remember-me">
                                    <label class="form-check-label" for="remember-me">
                                        Recordarme
                                    </label>
                                </div>

                                <div class="d-grid gap-2">
                                    <button type="submit" class="btn btn-primary btn-lg">
                                        <i class="bi bi-box-arrow-in-right me-2"></i>
                                        Iniciar Sesión
                                    </button>
                                </div>
                            </form>

                            <hr class="my-4">

                            <div class="text-center">
                                <p class="mb-0">
                                    ¿No tienes una cuenta?
                                    <a th:href="@{/register}" class="text-decoration-none">
                                        <i class="bi bi-person-plus me-1"></i>
                                        Regístrate aquí
                                    </a>
                                </p>
                            </div>

                            <!-- Demo Credentials -->
                            <div class="alert alert-info mt-3" role="alert">
                                <small>
                                    <strong>Credenciales de prueba:</strong><br>
                                    Usuario: <code>admin</code> / Contraseña: <code>admin</code>
                                </small>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div th:replace="~{fragments/footer :: footer}"></div>
</body>

</html>
