<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="es">

<head th:replace="~{fragments/head :: head('Mi Perfil')}"></head>

<body class="d-flex flex-column min-vh-100">
    <div th:replace="~{fragments/header :: header}"></div>

    <main class="flex-shrink-0">
        <div class="container mt-4">
            <!-- Breadcrumb -->
            <nav aria-label="breadcrumb">
                <ol class="breadcrumb">
                    <li class="breadcrumb-item"><a th:href="@{/}">Inicio</a></li>
                    <li class="breadcrumb-item active">Mi Perfil</li>
                </ol>
            </nav>

            <!-- Page Title -->
            <h1 class="mb-4">
                <i class="bi bi-person-circle me-2"></i>
                Mi Perfil
            </h1>

            <div class="row">
                <div class="col-md-8 mx-auto">
                    <!-- Profile Card -->
                    <div class="card shadow mb-4">
                        <div class="card-body p-4">
                            <div class="text-center mb-4">
                                <i class="bi bi-person-circle display-1 text-primary"></i>
                            </div>

                            <h5 class="card-title text-center mb-4">Información del Usuario</h5>

                            <div class="row mb-3">
                                <div class="col-sm-4 fw-bold">
                                    <i class="bi bi-person me-2"></i>
                                    Usuario:
                                </div>
                                <div class="col-sm-8" th:text="${username}">username</div>
                            </div>

                            <div class="row mb-3">
                                <div class="col-sm-4 fw-bold">
                                    <i class="bi bi-shield-check me-2"></i>
                                    Roles:
                                </div>
                                <div class="col-sm-8">
                                    <span class="badge bg-primary me-1" th:each="role : ${roles}"
                                        th:text="${role}">ROLE</span>
                                </div>
                            </div>

                            <hr class="my-4">

                            <div class="d-grid gap-2">
                                <a th:href="@{/profile/results}" class="btn btn-outline-primary">
                                    <i class="bi bi-graph-up me-2"></i>
                                    Ver Mis Resultados
                                </a>
                                <a th:href="@{/}" class="btn btn-outline-secondary">
                                    <i class="bi bi-house me-2"></i>
                                    Volver al Inicio
                                </a>
                            </div>
                        </div>
                    </div>

                    <!-- Quick Stats -->
                    <div class="card border-info">
                        <div class="card-body">
                            <h6 class="card-title">
                                <i class="bi bi-bar-chart-fill text-info me-2"></i>
                                Estadísticas Rápidas
                            </h6>
                            <div class="row text-center">
                                <div class="col-4">
                                    <h3 class="text-primary" th:text="${totalTests}">0</h3>
                                    <p class="text-muted small mb-0">Tests Realizados</p>
                                </div>
                                <div class="col-4">
                                    <h3 class="text-success" th:text="${averageScore} + '%'">0%</h3>
                                    <p class="text-muted small mb-0">Promedio</p>
                                </div>
                                <div class="col-4">
                                    <h3 class="text-warning" th:text="${totalQuestions}">0</h3>
                                    <p class="text-muted small mb-0">Preguntas Vistas</p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div th:replace="~{fragments/footer :: footer}"></div>
</body>

</html>
