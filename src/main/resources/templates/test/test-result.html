<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="es">

<head th:replace="~{fragments/head :: head('Resultado del Test')}"></head>

<body class="d-flex flex-column min-vh-100">
    <div th:replace="~{fragments/header :: header}"></div>

    <main class="flex-shrink-0">
        <div class="container mt-4">
            <!-- Breadcrumb -->
            <nav aria-label="breadcrumb">
                <ol class="breadcrumb">
                    <li class="breadcrumb-item"><a th:href="@{/}">Inicio</a></li>
                    <li class="breadcrumb-item"><a th:href="@{/test}">Test</a></li>
                    <li class="breadcrumb-item active">Resultado</li>
                </ol>
            </nav>

            <!-- Result Card -->
            <div class="card shadow-lg mb-4">
                <div class="card-header text-center py-4"
                    th:classappend="${result.score >= 70} ? 'bg-success text-white' : (${result.score >= 50} ? 'bg-warning' : 'bg-danger text-white')">
                    <h2 class="mb-0">
                        <i class="bi bi-trophy-fill me-2"></i>
                        ¡Test Completado!
                    </h2>
                </div>
                <div class="card-body text-center py-5">
                    <div class="row">
                        <div class="col-md-4 mb-3">
                            <h5 class="text-muted">Puntuación</h5>
                            <h1 class="display-3 fw-bold"
                                th:classappend="${result.score >= 70} ? 'text-success' : (${result.score >= 50} ? 'text-warning' : 'text-danger')"
                                th:text="${result.scoreFormatted}">85.0%</h1>
                        </div>
                        <div class="col-md-4 mb-3">
                            <h5 class="text-muted">Respuestas Correctas</h5>
                            <h1 class="display-3 fw-bold text-primary" th:text="${result.correctAnswers}">17</h1>
                        </div>
                        <div class="col-md-4 mb-3">
                            <h5 class="text-muted">Total Preguntas</h5>
                            <h1 class="display-3 fw-bold text-secondary" th:text="${result.totalQuestions}">20</h1>
                        </div>
                    </div>

                    <hr class="my-4">

                    <div class="row">
                        <div class="col-md-6 mb-2" th:if="${result.theme != null}">
                            <span class="badge bg-info fs-6">
                                <i class="bi bi-bookmark-fill me-1"></i>
                                <span th:text="${result.theme.name}">Tema</span>
                            </span>
                        </div>
                        <div class="col-md-6 mb-2" th:if="${result.difficulty != null}">
                            <span class="badge fs-6"
                                th:classappend="${result.difficulty.name() == 'EASY'} ? 'bg-success' : (${result.difficulty.name() == 'MEDIUM'} ? 'bg-warning' : 'bg-danger')">
                                <i class="bi bi-speedometer me-1"></i>
                                <span th:text="${result.difficulty}">Dificultad</span>
                            </span>
                        </div>
                    </div>

                    <p class="text-muted mt-3">
                        <i class="bi bi-calendar-event me-1"></i>
                        Completado el <span
                            th:text="${#temporals.format(result.completedAt, 'dd/MM/yyyy HH:mm')}">17/02/2026
                            12:00</span>
                    </p>
                </div>
            </div>

            <!-- Actions -->
            <div class="d-grid gap-2 d-md-flex justify-content-md-center mb-4">
                <a th:href="@{/test}" class="btn btn-primary btn-lg">
                    <i class="bi bi-arrow-repeat me-2"></i>
                    Hacer Otro Test
                </a>
                <a th:href="@{/profile/results}" class="btn btn-outline-secondary btn-lg">
                    <i class="bi bi-clock-history me-2"></i>
                    Ver Historial
                </a>
                <a th:href="@{/}" class="btn btn-outline-secondary btn-lg">
                    <i class="bi bi-house me-2"></i>
                    Volver al Inicio
                </a>
            </div>
        </div>
    </main>

    <div th:replace="~{fragments/footer :: footer}"></div>
</body>

</html>
