<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="es">

<head th:replace="~{fragments/head :: head('Preguntas')}"></head>

<body class="d-flex flex-column min-vh-100">
    <div th:replace="~{fragments/header :: header}"></div>

    <main class="flex-shrink-0">
        <div class="container mt-4">
            <!-- Breadcrumb -->
            <nav aria-label="breadcrumb">
                <ol class="breadcrumb">
                    <li class="breadcrumb-item"><a th:href="@{/}">Inicio</a></li>
                    <li class="breadcrumb-item active">Preguntas</li>
                </ol>
            </nav>

            <!-- Page Title -->
            <h1 class="mb-4">
                <i class="bi bi-question-circle-fill me-2"></i>
                Banco de Preguntas
            </h1>

            <!-- Filters -->
            <div class="card mb-4">
                <div class="card-body">
                    <form th:action="@{/questions}" method="get" class="row g-3">
                        <div class="col-md-4">
                            <label for="themeId" class="form-label">Tema</label>
                            <select class="form-select" id="themeId" name="themeId">
                                <option value="">Todos los temas</option>
                                <option th:each="theme : ${themes}" th:value="${theme.id}" th:text="${theme.name}"
                                    th:selected="${theme.id == selectedTheme}">
                                    Tema
                                </option>
                            </select>
                        </div>
                        <div class="col-md-4">
                            <label for="difficulty" class="form-label">Dificultad</label>
                            <select class="form-select" id="difficulty" name="difficulty">
                                <option value="">Todas las dificultades</option>
                                <option value="EASY" th:selected="${selectedDifficulty == 'EASY'}">Fácil</option>
                                <option value="MEDIUM" th:selected="${selectedDifficulty == 'MEDIUM'}">Media</option>
                                <option value="HARD" th:selected="${selectedDifficulty == 'HARD'}">Difícil</option>
                            </select>
                        </div>
                        <div class="col-md-4 d-flex align-items-end">
                            <button type="submit" class="btn btn-primary me-2">
                                <i class="bi bi-funnel me-1"></i>
                                Filtrar
                            </button>
                            <a th:href="@{/questions}" class="btn btn-secondary">
                                <i class="bi bi-x-circle me-1"></i>
                                Limpiar
                            </a>
                        </div>
                    </form>
                </div>
            </div>

            <!-- Questions List -->
            <div th:if="${questions.content.size() > 0}">
                <div class="row">
                    <div class="col-12" th:each="question : ${questions.content}">
                        <div class="card mb-3">
                            <div class="card-body">
                                <div class="d-flex justify-content-between align-items-start">
                                    <div class="flex-grow-1">
                                        <h5 class="card-title" th:text="${question.questionText}">Pregunta</h5>
                                        <div class="mb-2">
                                            <span class="badge bg-info me-2"
                                                th:text="${question.theme?.name ?: 'Sin tema'}">Tema</span>
                                            <span class="badge"
                                                th:classappend="${question.difficulty.name() == 'EASY'} ? 'bg-success' : (${question.difficulty.name() == 'MEDIUM'} ? 'bg-warning' : 'bg-danger')"
                                                th:text="${question.difficulty}">
                                                Dificultad
                                            </span>
                                            <span class="badge bg-secondary ms-2"
                                                th:text="${question.questionType}">Tipo</span>
                                        </div>
                                        <p class="text-muted small mb-0">
                                            <i class="bi bi-person me-1"></i>
                                            Creado por: <span th:text="${question.createdBy}">Usuario</span>
                                        </p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Pagination -->
                <nav th:if="${questions.totalPages > 1}">
                    <ul class="pagination justify-content-center">
                        <li class="page-item" th:classappend="${questions.first} ? 'disabled'">
                            <a class="page-link"
                                th:href="@{/questions(page=${questions.number - 1},size=${questions.size})}">Anterior</a>
                        </li>
                        <li class="page-item" th:each="i : ${#numbers.sequence(0, questions.totalPages - 1)}"
                            th:classappend="${i == questions.number} ? 'active'">
                            <a class="page-link" th:href="@{/questions(page=${i},size=${questions.size})}"
                                th:text="${i + 1}">1</a>
                        </li>
                        <li class="page-item" th:classappend="${questions.last} ? 'disabled'">
                            <a class="page-link"
                                th:href="@{/questions(page=${questions.number + 1},size=${questions.size})}">Siguiente</a>
                        </li>
                    </ul>
                    <div class="text-center text-muted small">
                        Mostrando página <span th:text="${questions.number + 1}">1</span> de <span
                            th:text="${questions.totalPages}">1</span>
                        (<span th:text="${questions.totalElements}">0</span> preguntas en total)
                    </div>
                </nav>
            </div>

            <!-- Empty State -->
            <div th:if="${questions.content.size() == 0}" class="text-center py-5">
                <i class="bi bi-inbox display-1 text-muted"></i>
                <h3 class="mt-3 text-muted">No hay preguntas disponibles</h3>
                <p class="text-muted">Intenta con otros filtros o crea nuevas preguntas</p>
            </div>
        </div>
    </main>

    <div th:replace="~{fragments/footer :: footer}"></div>
</body>

</html>
