<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">

<head th:replace="~{fragments/head :: head('Registrarse')}"></head>

<body class="d-flex flex-column min-vh-100">
    <div th:replace="~{fragments/header :: header}"></div>

    <main class="flex-shrink-0">
        <div class="container">
            <div class="row justify-content-center mt-5 mb-5">
                <div class="col-md-6 col-lg-5">
                    <div class="card shadow">
                        <div class="card-body p-5">
                            <div class="text-center mb-4">
                                <i class="bi bi-person-plus-fill display-1 text-success"></i>
                                <h2 class="mt-3">Crear Cuenta</h2>
                                <p class="text-muted">Únete a QuestionApp</p>
                            </div>

                            <!-- Error Messages -->
                            <div th:if="${error}" class="alert alert-danger" role="alert">
                                <i class="bi bi-exclamation-triangle-fill me-2"></i>
                                <span th:text="${error}">Error al registrarse</span>
                            </div>

                            <!-- Success Message -->
                            <div th:if="${success}" class="alert alert-success" role="alert">
                                <i class="bi bi-check-circle-fill me-2"></i>
                                <span th:text="${success}">Registro exitoso</span>
                            </div>

                            <!-- Registration Form -->
                            <form th:action="@{/register}" method="post" th:object="${user}">
                                <div class="mb-3">
                                    <label for="username" class="form-label">
                                        <i class="bi bi-person me-1"></i>
                                        Usuario *
                                    </label>
                                    <input type="text" class="form-control" id="username" th:field="*{username}"
                                        placeholder="Mínimo 3 caracteres" required minlength="3" autofocus>
                                    <div class="invalid-feedback" th:if="${#fields.hasErrors('username')}"
                                        th:errors="*{username}">
                                        Error en usuario
                                    </div>
                                </div>

                                <div class="mb-3">
                                    <label for="email" class="form-label">
                                        <i class="bi bi-envelope me-1"></i>
                                        Email *
                                    </label>
                                    <input type="email" class="form-control" id="email" th:field="*{email}"
                                        placeholder="ejemplo@correo.com" required>
                                    <div class="invalid-feedback" th:if="${#fields.hasErrors('email')}"
                                        th:errors="*{email}">
                                        Error en email
                                    </div>
                                </div>

                                <div class="mb-3">
                                    <label for="password" class="form-label">
                                        <i class="bi bi-lock me-1"></i>
                                        Contraseña *
                                    </label>
                                    <input type="password" class="form-control" id="password" th:field="*{password}"
                                        placeholder="Mínimo 6 caracteres" required minlength="6">
                                    <div class="invalid-feedback" th:if="${#fields.hasErrors('password')}"
                                        th:errors="*{password}">
                                        Error en contraseña
                                    </div>
                                </div>

                                <div class="mb-3">
                                    <label for="confirmPassword" class="form-label">
                                        <i class="bi bi-lock-fill me-1"></i>
                                        Confirmar Contraseña *
                                    </label>
                                    <input type="password" class="form-control" id="confirmPassword"
                                        name="confirmPassword" placeholder="Repita su contraseña" required
                                        minlength="6">
                                </div>

                                <div class="mb-3 form-check">
                                    <input type="checkbox" class="form-check-input" id="terms" required>
                                    <label class="form-check-label" for="terms">
                                        Acepto los términos y condiciones
                                    </label>
                                </div>

                                <div class="d-grid gap-2">
                                    <button type="submit" class="btn btn-success btn-lg">
                                        <i class="bi bi-person-check me-2"></i>
                                        Crear Cuenta
                                    </button>
                                </div>
                            </form>

                            <hr class="my-4">

                            <div class="text-center">
                                <p class="mb-0">
                                    ¿Ya tienes una cuenta?
                                    <a th:href="@{/login}" class="text-decoration-none">
                                        <i class="bi bi-box-arrow-in-right me-1"></i>
                                        Inicia sesión aquí
                                    </a>
                                </p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div th:replace="~{fragments/footer :: footer}"></div>
</body>

</html>
