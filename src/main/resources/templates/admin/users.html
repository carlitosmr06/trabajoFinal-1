<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="es">

<head th:replace="~{fragments/head :: head('Gestión de Usuarios')}"></head>

<body class="d-flex flex-column min-vh-100">
    <div th:replace="~{fragments/header :: header}"></div>

    <main class="flex-shrink-0">
        <div class="container mt-4">
            <!-- Breadcrumb -->
            <nav aria-label="breadcrumb">
                <ol class="breadcrumb">
                    <li class="breadcrumb-item"><a th:href="@{/}">Inicio</a></li>
                    <li class="breadcrumb-item active">Gestión de Usuarios</li>
                </ol>
            </nav>

            <!-- Page Title -->
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h1>
                    <i class="bi bi-people-fill me-2"></i>
                    Gestión de Usuarios
                </h1>
                <span class="badge bg-secondary fs-6">
                    Total: <span th:text="${totalUsers}">0</span> usuarios
                </span>
            </div>

            <!-- Flash Messages -->
            <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
                <i class="bi bi-check-circle me-2"></i>
                <span th:text="${successMessage}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
            <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
                <i class="bi bi-exclamation-triangle me-2"></i>
                <span th:text="${errorMessage}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>

            <!-- Users Table -->
            <div class="card">
                <div class="card-body">
                    <div class="table-responsive">
                        <table class="table table-hover">
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>Usuario</th>
                                    <th>Email</th>
                                    <th>Rol</th>
                                    <th>Acciones</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="user : ${users.content}">
                                    <td th:text="${user.id}">1</td>
                                    <td>
                                        <i class="bi bi-person-circle me-1"></i>
                                        <span th:text="${user.username}">usuario</span>
                                    </td>
                                    <td th:text="${user.email}">email@ejemplo.com</td>
                                    <td>
                                        <span class="badge"
                                            th:classappend="${user.roles.contains('ROLE_ADMIN')} ? 'bg-danger' : 'bg-primary'"
                                            th:text="${user.roles.contains('ROLE_ADMIN')} ? 'ADMIN' : 'USUARIO'">
                                            Rol
                                        </span>
                                    </td>
                                    <td>
                                        <div class="d-flex">
                                            <a th:href="@{/admin/users/{id}/edit(id=${user.id})}"
                                                class="btn btn-sm btn-primary me-1" title="Editar usuario">
                                                <i class="bi bi-pencil"></i>
                                            </a>
                                            <form th:action="@{/admin/users/{id}/delete(id=${user.id})}" method="post"
                                                style="display: inline;"
                                                onsubmit="return confirm('¿Estás seguro de que quieres eliminar este usuario?');">
                                                <button type="submit" class="btn btn-sm btn-danger"
                                                    title="Eliminar usuario">
                                                    <i class="bi bi-trash"></i>
                                                </button>
                                            </form>
                                        </div>
                                    </td>
                                </tr>
                                <tr th:if="${users.content.empty}">
                                    <td colspan="5" class="text-center text-muted py-4">
                                        <i class="bi bi-inbox fs-4 d-block mb-2"></i>
                                        No hay usuarios registrados
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>

                    <!-- Pagination -->
                    <nav th:if="${users.totalPages > 1}">
                        <ul class="pagination justify-content-center">
                            <li class="page-item" th:classappend="${users.first} ? 'disabled'">
                                <a class="page-link"
                                    th:href="@{/admin/users(page=${users.number - 1},size=${users.size})}">Anterior</a>
                            </li>
                            <li class="page-item" th:each="i : ${#numbers.sequence(0, users.totalPages - 1)}"
                                th:classappend="${i == users.number} ? 'active'">
                                <a class="page-link" th:href="@{/admin/users(page=${i},size=${users.size})}"
                                    th:text="${i + 1}">1</a>
                            </li>
                            <li class="page-item" th:classappend="${users.last} ? 'disabled'">
                                <a class="page-link"
                                    th:href="@{/admin/users(page=${users.number + 1},size=${users.size})}">Siguiente</a>
                            </li>
                        </ul>
                        <div class="text-center text-muted small">
                            Página <span th:text="${users.number + 1}">1</span> de
                            <span th:text="${users.totalPages}">1</span>
                            (<span th:text="${users.totalElements}">0</span> usuarios en total)
                        </div>
                    </nav>
                </div>
            </div>
        </div>
    </main>

    <div th:replace="~{fragments/footer :: footer}"></div>
</body>

</html>
